<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Vilela Pro — Infusão em Anestesia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #161b2e;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #4fc3f7;
    --accent2: #7c6af7;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --glow: rgba(79,195,247,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ruído e Efeito de Ambiente Originais */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .ambient {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(79,195,247,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* Telas de Login e App */
  #loginScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.6s, transform 0.6s;
  }
  #loginScreen.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

  .login-card {
    text-align: center; padding: 3rem 3.5rem; background: var(--surface);
    border: 1px solid var(--border-bright); border-radius: 20px;
    position: relative; max-width: 420px; width: 90%;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }

  .login-logo {
    font-family: 'DM Serif Display', serif; font-size: 2.4rem;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* Layout Principal */
  #app { display: none; min-height: 100vh; position: relative; z-index: 1; }
  #app.visible { display: flex; }

  .sidebar {
    width: 240px; background: var(--surface); border-right: 1px solid var(--border);
    height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column;
  }

  .drug-list { padding: 1rem; flex: 1; overflow-y: auto; }
  
  .drug-btn {
    display: flex; align-items: center; gap: 0.8rem; width: 100%;
    padding: 0.7rem 1rem; border-radius: 10px; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    font-family: 'Outfit', sans-serif; transition: all 0.2s;
  }
  .drug-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .drug-btn.active { background: rgba(79,195,247,0.1); color: var(--accent); box-shadow: inset 3px 0 0 var(--accent); }

  .main { flex: 1; padding: 2rem 3rem; max-width: 1000px; margin: 0 auto; width: 100%; }

  /* Cards de Cálculo */
  .calc-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
    padding: 2rem; margin-bottom: 1.5rem; position: relative;
  }

  .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1.2rem; }
  .input-field {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace;
    padding: 0.7rem; outline: none; transition: 0.2s;
  }
  .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,195,247,0.12); }

  /* ALERTAS DE SEGURANÇA (Novo Padrão) */
  .result-card.critical {
    border-color: var(--red) !important;
    background: rgba(248, 113, 113, 0.05) !important;
  }
  .safety-warning {
    color: var(--red); font-size: 0.7rem; margin-top: 8px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  }

  /* Estilos Originais dos Resultados */
  .result-row { display: flex; gap: 1rem; margin-top: 1.5rem; }
  .result-card {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.2rem; text-align: center;
  }
  .result-value { font-family: 'DM Mono', monospace; font-size: 2rem; color: var(--accent); }
  
  .welcome-big {
    font-family: 'DM Serif Display', serif; font-size: 3.5rem;
    background: linear-gradient(135deg, var(--text), var(--muted));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

</style>
</head>
<body>
<div class="ambient"></div>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Vilela Pro</div>
    <div style="color: var(--muted); margin: 1.5rem 0 2.5rem; font-size: 0.9rem;">SISTEMA AVANÇADO DE INFUSÃO</div>
    <button class="login-btn" onclick="enterApp()" style="background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; padding: 1rem 2.5rem; border-radius: 50px; cursor: pointer; font-weight: 600;">Iniciar Sessão</button>
  </div>
</div>

<div id="app">
  <aside class="sidebar">
    <div style="padding: 2rem 1.5rem; font-family: 'DM Serif Display'; font-size: 1.5rem; color: var(--accent);">Vilela Pro</div>
    <div class="drug-list" id="drugList"></div>
    <div style="padding: 1rem; border-top: 1px solid var(--border);">
      <button class="drug-btn" onclick="showFluidCalc()">💧 Hidratação 4-2-1</button>
    </div>
  </aside>

  <main class="main">
    <div id="welcome" class="welcome">
      <h1 class="welcome-big">Bem-vindo, <br>Dr. Vilela</h1>
      <p style="color: var(--muted); margin-top: 1rem;">Selecione um protocolo ou fármaco para iniciar.</p>
    </div>

    <div id="panels"></div>

    <div id="panel-fluids" class="drug-panel" style="display:none;">
      <div class="panel-header"><div class="panel-name" style="font-family:'DM Serif Display'; font-size: 2rem;">Reposição Volêmica</div></div>
      <div class="calc-card">
        <div class="input-grid">
          <div class="input-group">
            <label class="input-label" style="font-size:0.7rem; color:var(--muted)">PESO DO PACIENTE (KG)</label>
            <input type="number" id="fluid-weight" class="input-field" placeholder="70" oninput="calculateFluids()">
          </div>
        </div>
        <div class="result-row">
          <div class="result-card">
            <div class="result-label" style="font-size:0.7rem; color:var(--muted)">MANUTENÇÃO (ML/H)</div>
            <div id="fluid-res" class="result-value">0.0</div>
          </div>
          <div class="result-card">
            <div class="result-label" style="font-size:0.7rem; color:var(--muted)">DÉFICIT JEJUM (8H)</div>
            <div id="fluid-fast" class="result-value" style="color:var(--accent2)">0.0</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// Dados Originais + Atributos de Segurança (Range)
const DRUGS = [
  {
    id: 'nora', icon: '🧪', name: 'Noradrenalina', abbr: 'NORA', class: 'Vasopressor', group: 'Vasopressores',
    range: { min: 0.05, max: 2.0 },
    inputs: [
      {id:'peso', label:'Peso (kg)', def: 70},
      {id:'massa', label:'Massa (mg)', def: 8},
      {id:'soro', label:'Soro (mL)', def: 250},
      {id:'dose', label:'Dose (mcg/kg/min)', def: 0.1}
    ],
    calc: (v) => {
      const conc = (v.massa * 1000) / v.soro;
      const vazao = (v.dose * v.peso * 60) / conc;
      return [{label: 'Vazão', value: vazao.toFixed(1), unit: 'mL/h'}];
    }
  },
  {
    id: 'propofol', icon: '🌑', name: 'Propofol', abbr: 'PROP', class: 'Hipnótico', group: 'Hipnóticos',
    range: { min: 50, max: 200 },
    inputs: [
      {id:'peso', label:'Peso (kg)', def: 70},
      {id:'conc', label:'Conc. (mg/mL)', def: 10},
      {id:'dose', label:'Dose (mcg/kg/min)', def: 100}
    ],
    calc: (v) => {
      const vazao = (v.dose * v.peso * 60) / (v.conc * 1000);
      return [{label: 'Vazão Manutenção', value: vazao.toFixed(1), unit: 'mL/h'}];
    }
  }
  // ... Você pode replicar as outras drogas aqui seguindo este padrão
];

function init() {
  const list = document.getElementById('drugList');
  const panels = document.getElementById('panels');

  DRUGS.forEach(d => {
    // Sidebar
    const btn = document.createElement('button');
    btn.className = 'drug-btn';
    btn.id = `btn-${d.id}`;
    btn.innerHTML = `<span>${d.icon}</span><span>${d.name}</span>`;
    btn.onclick = () => showDrug(d.id);
    list.appendChild(btn);

    // Painel
    const p = document.createElement('div');
    p.id = `panel-${d.id}`;
    p.className = 'drug-panel';
    p.style.display = 'none';

    const inputsHTML = d.inputs.map(i => `
      <div class="input-group">
        <label style="font-size:0.65rem; color:var(--muted); text-transform: uppercase;">${i.label}</label>
        <input type="number" class="input-field" data-drug="${d.id}" data-id="${i.id}" value="${i.def}" oninput="recalc('${d.id}')">
      </div>
    `).join('');

    p.innerHTML = `
      <div style="margin-bottom: 2rem;">
        <h2 style="font-family:'DM Serif Display'; font-size: 2.2rem;">${d.name}</h2>
        <span style="font-size: 0.7rem; background: var(--surface2); padding: 4px 12px; border-radius: 4px; color: var(--muted);">${d.class}</span>
      </div>
      <div class="calc-card">
        <div class="input-grid">${inputsHTML}</div>
        <div class="result-row" id="res-row-${d.id}"></div>
      </div>
    `;
    panels.appendChild(p);
    recalc(d.id);
  });
}

function recalc(id) {
  const drug = DRUGS.find(d => d.id === id);
  const inputs = document.querySelectorAll(`[data-drug="${id}"]`);
  const vals = {};
  inputs.forEach(i => vals[i.dataset.id] = parseFloat(i.value) || 0);

  const results = drug.calc(vals);
  const row = document.getElementById(`res-row-${id}`);
  
  // Lógica de Segurança
  const isSafe = vals.dose >= drug.range.min && vals.dose <= drug.range.max;

  row.innerHTML = results.map(r => `
    <div class="result-card ${!isSafe ? 'critical' : ''}">
      <div style="font-size:0.7rem; color:var(--muted);">${r.label}</div>
      <div class="result-value">${r.value}</div>
      <div style="font-size:0.7rem; color:var(--muted);">${r.unit}</div>
      ${!isSafe ? `<div class="safety-warning">⚠️ Fora do Range</div>` : ''}
    </div>
  `).join('');
}

function calculateFluids() {
  const w = parseFloat(document.getElementById('fluid-weight').value) || 0;
  let rate = 0;
  if (w <= 10) rate = w * 4;
  else if (w <= 20) rate = 40 + (w - 10) * 2;
  else rate = 60 + (w - 20) * 1;
  
  document.getElementById('fluid-res').innerText = rate.toFixed(1);
  document.getElementById('fluid-fast').innerText = (rate * 8).toFixed(1);
}

function showDrug(id) {
  hideAll();
  document.getElementById(`panel-${id}`).style.display = 'block';
  document.getElementById(`btn-${id}`).classList.add('active');
}

function showFluidCalc() {
  hideAll();
  document.getElementById('panel-fluids').style.display = 'block';
}

function hideAll() {
  document.querySelectorAll('.drug-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.drug-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('welcome').style.display = 'none';
}

function enterApp() {
  document.getElementById('loginScreen').classList.add('hide');
  const app = document.getElementById('app');
  app.style.display = 'flex';
  setTimeout(() => app.classList.add('visible'), 10);
}

window.onload = init;
</script>
</body>
</html>
